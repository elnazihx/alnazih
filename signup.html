<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب | النزيه</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0f0b14;
    --card: #1a1424;
    --line: rgba(211,117,164,0.16);
    --primary: #be285a;
    --primary-light: #d3488a;
    --accent: #d375a4;
    --accent-soft: rgba(211,117,164,0.1);
    --text: #f5e9ee;
    --text-dim: #cbb9c4;
    --text-mute: #8b7a94;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family:'Almarai', sans-serif;
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
  }
  body::before{
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse 700px 500px at 85% -5%, rgba(190,40,90,0.22), transparent 60%),
      radial-gradient(ellipse 600px 500px at 10% 90%, rgba(211,117,164,0.12), transparent 55%);
    pointer-events:none; z-index:0;
  }
  h1,h2,.display{ font-family:'Cairo', sans-serif; }
  a{ text-decoration:none; color:inherit; }
  input, select{ font-family:'Almarai', sans-serif; }

  .page{
    position:relative; z-index:1;
    max-width:560px;
    margin:0 auto;
    padding:60px 24px 80px;
  }

  .back-link{
    display:inline-flex; align-items:center; gap:6px;
    color: var(--text-mute);
    font-size:.9rem; font-weight:700;
    margin-bottom:36px;
    transition: color .2s ease;
  }
  .back-link:hover{ color: var(--accent); }

  .logo-top{
    display:flex; flex-direction:column; align-items:center;
    margin-bottom:34px;
  }
  .form-logo{
    width:110px; height:110px;
    display:block;
    filter: drop-shadow(0 10px 26px rgba(190,40,90,0.4));
    margin-bottom:14px;
  }
  .logo-top span{
    font-family:'Cairo',sans-serif; font-weight:800; font-size:1.4rem;
    background: linear-gradient(90deg,#f5e9ee,#e9c9d8);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }

  .form-card{
    background: var(--card);
    border:1px solid var(--line);
    border-radius:28px;
    padding:38px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  }

  .form-card h1{
    font-size:1.5rem; font-weight:800; text-align:center; margin-bottom:6px;
  }
  .form-card .sub{
    text-align:center; color:var(--text-mute); font-size:.92rem; margin-bottom:30px;
  }

  .field{ margin-bottom:18px; position:relative; }
  .field label{
    display:block; font-size:.86rem; font-weight:700;
    color: var(--text-dim); margin-bottom:8px;
  }
  .field input, .field select{
    width:100%;
    background: rgba(255,255,255,0.03);
    border:1px solid rgba(211,117,164,0.18);
    color: var(--text);
    padding:13px 16px;
    border-radius:14px;
    font-size:.95rem;
    outline:none;
    transition: border-color .2s ease, background .2s ease;
    appearance:none;
    -webkit-appearance:none;
  }
  .field input::placeholder{ color: var(--text-mute); }
  .field input:focus, .field select:focus{
    border-color: var(--primary-light);
    background: rgba(211,117,164,0.06);
  }
  .field select{
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='9' viewBox='0 0 14 9' fill='none'><path d='M1 1L7 7L13 1' stroke='%23d375a4' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat:no-repeat;
    background-position: left 16px center;
    cursor:pointer;
  }
  .field select option{ background: #1a1424; color: var(--text); }

  .row-2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media (max-width:520px){ .row-2{ grid-template-columns:1fr; } }

  .submit-btn{
    width:100%;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color:#fff;
    font-family:'Cairo',sans-serif;
    font-weight:800;
    font-size:1.02rem;
    padding:15px;
    border:none;
    border-radius:14px;
    margin-top:12px;
    box-shadow: 0 8px 24px rgba(190,40,90,0.35);
    transition: transform .2s ease, box-shadow .2s ease;
    cursor:pointer;
  }
  .submit-btn:hover{ transform:translateY(-2px); box-shadow:0 12px 30px rgba(190,40,90,0.45); }

  .switch-link{
    text-align:center; margin-top:24px; color:var(--text-mute); font-size:.9rem;
  }
  .switch-link a{ color: var(--accent); font-weight:800; }
  .switch-link a:hover{ text-decoration:underline; }
</style>
</head>

  <div class="form-card">
    <h1>إنشاء حساب جديد</h1>
    <p class="sub">سجّل بياناتك وابدأ رحلتك في تعلم الكيمياء</p>

    <form id="signupForm">
      <div class="field">
        <label for="fullname">الاسم بالكامل</label>
        <input type="text" id="fullname" name="fullname" placeholder="اكتب اسمك بالكامل" required>
      </div>

      <div class="row-2">
        <div class="field">
          <label for="phone">رقم الهاتف الخاص</label>
          <input type="tel" id="phone" name="phone" placeholder="01xxxxxxxxx" required>
        </div>
        <div class="field">
          <label for="guardian-phone">رقم ولي الأمر</label>
          <input type="tel" id="guardian-phone" name="guardian_phone" placeholder="01xxxxxxxxx" required>
        </div>
      </div>

      <div class="field">
        <label for="governorate">المحافظة</label>
        <select id="governorate" name="governorate" required>
          <option value="" disabled selected>اختر المحافظة</option>
        </select>
      </div>

      <div class="field">
        <label for="stage">المرحلة الدراسية</label>
        <select id="stage" name="stage" required>
          <option value="" disabled selected>اختر المرحلة الدراسية</option>
        </select>
      </div>

      <div class="field">
        <label for="password">الباسورد</label>
        <input type="password" id="password" name="password" placeholder="اكتب باسورد قوي" required>
      </div>

      <button type="submit" class="submit-btn">إنشاء الحساب</button>
    </form>

    <p class="switch-link">عندك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
  </div>
</div>

<script>
  const governorates = [
    "القاهرة","الجيزة","الإسكندرية","الدقهلية","البحر الأحمر","البحيرة","الفيوم",
    "الغربية","الإسماعيلية","المنوفية","المنيا","القليوبية","الوادي الجديد","السويس",
    "أسوان","أسيوط","بني سويف","بورسعيد","دمياط","الشرقية","جنوب سيناء","كفر الشيخ",
    "مطروح","الأقصر","قنا","شمال سيناء","سوهاج"
  ];

  const stages = [
    "الصف الأول الإعدادي","الصف الثاني الإعدادي","الصف الثالث الإعدادي",
    "الصف الأول الثانوي","الصف الثاني الثانوي","الصف الثالث الثانوي"
  ];

  const govSelect = document.getElementById('governorate');
  governorates.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g; opt.textContent = g;
    govSelect.appendChild(opt);
  });

  const stageSelect = document.getElementById('stage');
  stages.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    stageSelect.appendChild(opt);
  });

  document.getElementById('signupForm').addEventListener('submit', (e) => {
    e.preventDefault();
    // Backend connection will be added later
    alert('تم استلام بياناتك! هيتم ربط النظام بالسيرفر قريب.');
  });
</script>
