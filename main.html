<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الصفحة الرئيسية | النزيه</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAjoaaMX2D6KidAp6z8yapoeSxubNp_qDY",
    authDomain: "alnazih.firebaseapp.com",
    projectId: "alnazih",
    storageBucket: "alnazih.firebasestorage.app",
    messagingSenderId: "318081681460",
    appId: "1:318081681460:web:7526996a02a1f3ac5be261",
    measurementId: "G-6L9S7XKBXF"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let unsubscribeSnapshot = null;
  let firstSnapshot = true;

  // Guard: if not logged in, redirect to login immediately.
  onAuthStateChanged(auth, (user) => {
    if(!user){
      if(unsubscribeSnapshot){ unsubscribeSnapshot(); unsubscribeSnapshot = null; }
      window.location.replace('login.html');
      return;
    }

    const mySessionId = localStorage.getItem('nazih_session_id');
    firstSnapshot = true;

    // Real-time listener: watches this student's document. If another
    // device logs into the same account, it writes a new activeSession
    // value, which this listener picks up instantly and signs this
    // device out.
    unsubscribeSnapshot = onSnapshot(doc(db, 'students', user.uid), async (snap) => {
      const data = snap.exists() ? snap.data() : null;

      if(!data){
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        document.getElementById('studentName').textContent = 'الطالب';
        firstSnapshot = false;
        return;
      }

      // Session check (skip on the very first read right after login,
      // since this device just wrote that session ID itself).
      if(!firstSnapshot && mySessionId && data.activeSession && data.activeSession !== mySessionId){
        if(unsubscribeSnapshot){ unsubscribeSnapshot(); unsubscribeSnapshot = null; }
        localStorage.removeItem('nazih_session_id');
        await signOut(auth);
        alert('تم تسجيل الدخول لحسابك من جهاز تاني، فتم تسجيل خروجك من هنا.');
        window.location.replace('login.html');
        return;
      }

      firstSnapshot = false;

      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      document.getElementById('studentName').textContent = data.fullname || 'الطالب';
      document.getElementById('studentStage').textContent = data.stage || '';
    }, (err) => {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      document.getElementById('studentName').textContent = 'الطالب';
    });
  });

  document.addEventListener('DOMContentLoaded', () => {
    const logoutBtn = document.getElementById('logoutBtn');
    if(logoutBtn){
      logoutBtn.addEventListener('click', async () => {
        if(unsubscribeSnapshot){ unsubscribeSnapshot(); unsubscribeSnapshot = null; }
        localStorage.removeItem('nazih_session_id');
        await signOut(auth);
        window.location.replace('login.html');
      });
    }
  });
</script>

<style>
  :root{
    --bg: #0f0b14;
    --bg-soft: #150f1c;
    --card: #1a1424;
    --card-hover: #211a2c;
    --line: rgba(211,117,164,0.14);
    --primary: #be285a;
    --primary-light: #d3488a;
    --accent: #d375a4;
    --accent-soft: rgba(211,117,164,0.12);
    --text: #f5e9ee;
    --text-dim: #cbb9c4;
    --text-mute: #8b7a94;
    --gold: #e8b25c;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html{ scroll-behavior:smooth; max-width:100%; overflow-x:hidden; }

  body{
    background: var(--bg);
    color: var(--text);
    font-family:'Almarai', sans-serif;
    overflow-x:hidden;
    max-width:100vw;
    min-height:100vh;
    position:relative;
  }

  .wrap{ max-width:1240px; margin:0 auto; padding:0 32px; }
  @media (max-width:600px){
    .wrap{ padding:0 20px; }
  }

  /* Loading screen shown while checking auth state */
  #loadingScreen{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background: var(--bg);
    z-index:999;
  }
  .spinner{
    width:44px; height:44px;
    border:3px solid rgba(211,117,164,0.2);
    border-top-color: var(--accent);
    border-radius:50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  #mainContent{ display:none; }

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:20px 0;
    border-bottom:1px solid var(--line);
  }
  .brand-name{
    font-family:'Cairo', sans-serif;
    font-weight:900;
    font-size:1.3rem;
    color: var(--accent);
  }
  .logout-btn{
    background: transparent;
    border:1px solid rgba(211,117,164,0.35);
    color: var(--text-dim);
    padding:9px 18px;
    border-radius:100px;
    font-family:'Almarai', sans-serif;
    font-weight:700;
    font-size:.85rem;
    cursor:pointer;
    transition:.2s;
  }
  .logout-btn:hover{ background: rgba(211,117,164,0.1); color: var(--text); }

  .welcome{
    padding:56px 0 20px;
  }
  .welcome h1{
    font-family:'Cairo', sans-serif;
    font-weight:800;
    font-size:1.7rem;
    margin-bottom:8px;
  }
  .welcome h1 span{ color: var(--accent); }
  .welcome p{ color: var(--text-mute); font-size:.95rem; }

  .cards{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:16px;
    padding:24px 0 60px;
  }
  .info-card{
    background: var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding:22px;
  }
  .info-card h3{
    font-family:'Cairo', sans-serif;
    font-size:1rem;
    margin-bottom:6px;
    color: var(--text);
  }
  .info-card p{ color: var(--text-mute); font-size:.85rem; line-height:1.6; }
</style>
</head>
<body>

<div id="loadingScreen">
  <div class="spinner"></div>
</div>

<div id="mainContent">
  <div class="wrap">
    <div class="topbar">
      <span class="brand-name">النزيه</span>
      <button class="logout-btn" id="logoutBtn">تسجيل الخروج</button>
    </div>

    <div class="welcome">
      <h1>أهلاً بيك يا <span id="studentName">الطالب</span> 👋</h1>
      <p id="studentStage"></p>
    </div>

    <div class="cards">
      <div class="info-card">
        <h3>الكورسات المتاحة</h3>
        <p>تصفح كل الكورسات المتاحة لمرحلتك الدراسية وابدأ رحلتك في الكيمياء.</p>
      </div>
      <div class="info-card">
        <h3>تقدمك الدراسي</h3>
        <p>هتقدر تتابع هنا تقدمك في كل كورس ونسبة إنجازك.</p>
      </div>
      <div class="info-card">
        <h3>الدعم الفني</h3>
        <p>لو عندك أي استفسار، تقدر تتواصل معانا في أي وقت.</p>
      </div>
    </div>
  </div>
</div>

</body>
</html>
